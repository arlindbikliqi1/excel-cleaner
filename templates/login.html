<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hyrje - Excel Cleaner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(145deg, #1e293b 0%, #334155 50%, #3b82f6 100%);
    }
    .login-card {
      max-width: 420px;
      width: 100%;
      border: none;
      border-radius: 16px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }
    .login-card .card-body { padding: 2rem; }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.5rem;
      margin: 0 auto 1rem;
    }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="card-body">
      <div class="brand-icon"><i class="fas fa-file-excel"></i></div>
      <h1 class="h4 text-center fw-bold mb-1">Excel Cleaner</h1>
      <p class="text-center text-muted small mb-4">Paneli i administratorit</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
            <input type="text" class="form-control" name="username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
            <input type="password" class="form-control" name="password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="fas fa-sign-in-alt me-1"></i> Hyr
        </button>
      </form>
    </div>
  </div>
</body>
</html>
